<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
  <div class="container">
    <!-- Logo -->
    <a class="navbar-brand d-flex align-items-center fw-bold text-primary" routerLink="/book-store/home">
      <i class="bi bi-book-half me-2 fs-3"></i>
      <span>Nico<span class="text-dark">Libri</span></span>
    </a>

    <!-- Botón Móvil -->
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent">
      <!-- Enlaces de Navegación -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
        <li class="nav-item">
          <a class="nav-link fw-medium" routerLink="/book-store/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a>
        </li>
        <li class="nav-item">
            <a class="nav-link fw-medium" routerLink="/book-store/search" routerLinkActive="active">Explorar</a>
        </li>
      </ul>

      <!-- Buscador -->
      <form class="d-flex flex-grow-1 mx-lg-4 my-2 my-lg-0" role="search"
      (submit)="onSearch(searchInput.value); $event.preventDefault()"

      >
        <div class="input-group">
          <input #searchInput class="form-control bg-light border-0" type="search" placeholder="Buscar libros, autores..." aria-label="Search">
          <button class="btn btn-outline-primary border-0 bg-light" type="submit">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </form>

      <!-- Acciones de Usuario -->
      <div class="d-flex align-items-center gap-3">
        <!-- Carrito -->
        <a routerLink="/book-store/cart" class="btn btn-light position-relative rounded-circle p-2 text-dark border-0">
          <i class="bi bi-cart3 fs-5"></i>
          @if (totalCartItems() > 0) {
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem;">
              {{ totalCartItems() }}
              <span class="visually-hidden">libros en el carrito</span>
            </span>
          }
        </a>

        <!-- Perfil / Login -->
        <div class="dropdown">
          <a class="btn btn-primary rounded-pill px-4 d-flex align-items-center gap-2 shadow-sm" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle"></i>
            <span class="d-none d-md-inline">Mi Cuenta</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm mt-2 text-center">
            <li><a class="dropdown-item" routerLink="/auth/login">Iniciar Sesión</a></li>
            <li><a class="dropdown-item" routerLink="/book-store/register">Registrarse</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" routerLink="/manage-book">Mis Libros</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>
